<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Melo Password Reset</title>

  <script>
    function openApp() {
      const hash = window.location.hash || "";
      const appUrl = "melomp://reset-password" + hash;
      window.location.href = appUrl;
    }

    window.onload = openApp;
  </script>
</head>

<body style="font-family:sans-serif;text-align:center;padding-top:40px;">

  <h2>Opening Melo…</h2>
  <p>If the app doesn't open automatically tap below.</p>

  <button onclick="openApp()" style="padding:12px 20px;font-size:16px;">
    Open Melo App
  </button>

</body>
</html>
